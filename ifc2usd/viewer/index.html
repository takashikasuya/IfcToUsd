<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>ifc2usd viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      html, body { margin: 0; height: 100%; background: #202020; color: #eee; font-family: sans-serif; }
      #app { display: flex; height: 100%; }
      #tree-panel { width: 280px; overflow-y: auto; border-right: 1px solid #444; padding: 8px; box-sizing: border-box; font-size: 13px; }
      #tree-search-input {
        width: 100%; box-sizing: border-box; margin-bottom: 6px; padding: 4px 6px;
        background: #2a2a2a; border: 1px solid #444; color: #eee; border-radius: 3px; font-size: 12px;
      }
      #tree-panel ul { list-style: none; margin: 0; padding-left: 16px; }
      #tree-panel ul.tree-root { padding-left: 0; }
      #tree-panel li { padding: 2px 0; }
      #tree-panel li.search-hidden { display: none; }
      #tree-panel .tree-row { display: flex; align-items: center; gap: 2px; }
      #tree-panel .tree-toggle { width: 14px; flex: none; text-align: center; cursor: pointer; user-select: none; color: #888; }
      #tree-panel .tree-toggle-empty { cursor: default; }
      #tree-panel .tree-color-chip { width: 8px; height: 8px; border-radius: 50%; flex: none; display: inline-block; }
      #tree-panel .tree-label {
        cursor: pointer; padding: 1px 4px; border-radius: 3px; flex: 1; min-width: 0;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      #tree-panel .tree-label:hover { background: #333; }
      #tree-panel li.hovered > .tree-row > .tree-label { background: #2a355c; }
      #tree-panel li.selected > .tree-row > .tree-label { background: #3355ff; color: #fff; }
      #tree-panel mark.tree-match { background: #665c00; color: inherit; border-radius: 2px; }
      #tree-panel .tree-isolate-btn {
        visibility: hidden; flex: none; background: none; border: none; color: #aaa;
        cursor: pointer; font-size: 11px; line-height: 1; padding: 2px;
      }
      #tree-panel .tree-row:hover .tree-isolate-btn { visibility: visible; }
      #tree-panel li.isolated > .tree-row > .tree-isolate-btn { visibility: visible; color: #6cf; }
      #viewport { flex: 1; position: relative; }
      #viewport canvas { display: block; width: 100%; height: 100%; }
      #property-panel { width: 300px; overflow-y: auto; border-left: 1px solid #444; padding: 8px; box-sizing: border-box; }
      #property-panel .property-guide { color: #888; font-size: 13px; }
      #property-panel dl { margin: 0; font-size: 13px; }
      #property-panel dt { color: #999; margin-top: 8px; font-size: 11px; text-transform: uppercase; }
      #property-panel dd { margin: 2px 0 0 0; display: flex; align-items: center; gap: 6px; }
      #property-panel .property-class-chip { width: 9px; height: 9px; border-radius: 50%; flex: none; display: inline-block; background: #666; }
      #property-panel .property-guid-text { overflow-wrap: anywhere; }
      #property-panel .property-copy-btn {
        flex: none; background: #2a2a2a; border: 1px solid #444; color: #ccc;
        border-radius: 3px; font-size: 11px; padding: 1px 6px; cursor: pointer;
      }
      #property-panel .property-copy-btn:hover { background: #3a3a3a; }
      #display-controls {
        position: absolute; top: 8px; left: 8px; z-index: 5;
        /* 絶対配置なので通常フローの幅に従わない。狭いビューポートでは折り返し
           無しだと隣の#property-panelへ重なってしまう(E8-4で発覚)ため、
           #viewport自身の幅までで折り返す。ツールバーそのものの再設計(グループ化・
           折りたたみ)はE8-5のスコープ。 */
        max-width: calc(100% - 16px); flex-wrap: wrap; row-gap: 6px;
        background: rgba(32, 32, 32, 0.85); border: 1px solid #444; border-radius: 4px;
        padding: 6px 8px; font-size: 12px; display: flex; align-items: center; gap: 12px;
      }
      #display-controls fieldset { border: none; margin: 0; padding: 0; display: flex; gap: 8px; }
      #display-controls legend { display: none; }
      #display-controls label { cursor: pointer; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.min.js",
          "three/addons/controls/OrbitControls.js": "./vendor/controls/OrbitControls.js",
          "three/addons/loaders/GLTFLoader.js": "./vendor/loaders/GLTFLoader.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div id="tree-panel">
        <input type="text" id="tree-search-input" placeholder="Search name / class / GUID" aria-label="Tree search" />
        <div id="tree-nodes"></div>
      </div>
      <div id="viewport">
        <div id="display-controls">
          <fieldset id="display-mode-controls">
            <legend>Display mode</legend>
            <label><input type="radio" name="display-mode" value="mesh" /> Mesh</label>
            <label><input type="radio" name="display-mode" value="voxel" /> Voxel</label>
            <label><input type="radio" name="display-mode" value="both" checked /> Both</label>
          </fieldset>
          <select id="voxel-lod-select" aria-label="Voxel LOD"></select>
          <label>
            <input type="checkbox" id="wireframe-toggle" /> Wireframe
          </label>
          <label>
            <input type="checkbox" id="ghost-toggle" /> Ghost
          </label>
          <label>
            Section
            <input type="range" id="section-height-slider" aria-label="Section height" disabled />
          </label>
          <label>
            <input type="checkbox" id="sdf-slice-toggle" disabled /> SDF slice
          </label>
          <label>
            <input type="range" id="sdf-slice-height-slider" aria-label="SDF slice height" disabled />
          </label>
        </div>
      </div>
      <div id="property-panel"></div>
    </div>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
